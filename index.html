<style>
/* BLOGGER FIX */
body .main-inner,
body .content-outer,
body .content-fauxcolumn-outer{
  max-width:100% !important;
  padding:0 !important;
  margin:0 !important;
}

body{
  margin:0;
  background:#05070d;
  font-family:'Poppins',sans-serif;
  color:white;
}

/* HERO */
.hero{
  position:relative;
  height:65vh;
  background:
  linear-gradient(to top,rgba(0,0,0,.88),rgba(0,0,0,.35)),
  url('https://images.unsplash.com/photo-1601944177325-f8867652837f?q=80&w=1470') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-start;
  padding:50px;
  overflow:hidden;
}

.hero::before{
  content:'';
  position:absolute;
  inset:0;
  backdrop-filter:blur(2px);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:700px;
}

.hero h1{
  font-size:52px;
  margin:0;
  font-weight:700;
  line-height:1.1;
}

.hero p{
  margin-top:15px;
  color:#ddd;
  font-size:18px;
}

/* DISCORD BUTTON */
.discord-btn{
  display:inline-block;
  margin-top:25px;
  background:linear-gradient(135deg,#5865F2,#404EED);
  color:#fff !important;
  padding:14px 28px;
  border-radius:50px;
  text-decoration:none;
  font-weight:600;
  transition:.3s;
  box-shadow:0 0 20px rgba(88,101,242,.4);
}

.discord-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 0 25px rgba(88,101,242,.8);
}

/* CATEGORY BAR */
.categories{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:20px;
  background:#0d111b;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.categories::-webkit-scrollbar{
  display:none;
}

.cat-btn{
  padding:12px 22px;
  border-radius:30px;
  background:#151b27;
  border:1px solid rgba(255,255,255,.08);
  cursor:pointer;
  white-space:nowrap;
  transition:.3s;
  font-weight:500;
}

.cat-btn:hover,
.cat-btn.active{
  background:#1f80e0;
  box-shadow:0 0 15px rgba(31,128,224,.5);
}

/* SECTION */
.section{
  padding:35px 20px;
}

/* GRID */
.row{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:22px;
}

/* CARD */
.card{
  background:#0f1420;
  border-radius:18px;
  overflow:hidden;
  text-decoration:none;
  transition:.35s;
  border:1px solid rgba(255,255,255,.05);
  position:relative;
}

.card:hover{
  transform:translateY(-8px) scale(1.03);
  box-shadow:0 10px 25px rgba(0,0,0,.55);
  border-color:#1f80e0;
}

.card img{
  width:100%;
  height:130px;
  object-fit:contain;
  background:#000;
  padding:20px;
}

/* CHANNEL NAME */
.channel-name{
  padding:14px;
  text-align:center;
  font-size:15px;
  font-weight:600;
  color:#fff;
}

/* HIDE */
.hidden{
  display:none !important;
}

/* MOBILE */
@media(max-width:768px){

.hero{
  height:55vh;
  padding:30px 20px;
}

.hero h1{
  font-size:36px;
}

.hero p{
  font-size:15px;
}

.row{
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.card img{
  height:110px;
}

}

<script>
function filterCards(category,el){

  let cards=document.querySelectorAll('.card');

  cards.forEach(card=>{

    if(category==='all'){
      card.classList.remove('hidden');
    }

    else if(card.classList.contains(category)){
      card.classList.remove('hidden');
    }

    else{
      card.classList.add('hidden');
    }

  });

  document.querySelectorAll('.cat-btn').forEach(btn=>{
    btn.classList.remove('active');
  });

  el.classList.add('active');
}
</script>
